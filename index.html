<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <header>
        <div class="head">
            <!-- 1:logo -->
             <div class="logo">
                    <div class="left">
                        <h1>BookMyShow</h1>
                    </div>
                    <div class="right">
                        <button>Movies</button>
                        <button>Sports</button>
                        <button>Events</button>
                        <button>More</button>
                    </div>
             </div>
             <!-- 2:search -->
              <div class="search">
                <input type="text" class="searching" placeholder="search for movies,events or sports">
                <button>Search</button>
            </div>
        </div>

    </header>
    <main>
        <!-- hero -->
         <div class="hero">
            <h2>Experience the Best Movies and Events</h2>
            <button>Book Now</button>
         </div>
         <div class="mover">
            <h3>Popular Movies</h3>
         </div>
         <div class="movie">
            <div class="card">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQPp7WmXEM1Rzk9rGhSu6Rs6QcLDmvph8eMJ0gHtLRgB5onm4TlwH9USO3G&s=10" alt="" class="images">
                <h3>Krishna Cottage</h3>
            </div>

            <div class="card">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSEMAGGS72H98pxUt9MIODtyYna5cmE079LrpaCU_p6MUiWdGn2D6ctQ-RP&s=10" alt="" class="images">
                <h3>Wednesday</h3>
            </div>

            <div class="card">
                <img src="https://m.media-amazon.com/images/I/810cJGXnk0L._AC_UF1000,1000_QL80_.jpg" alt="" class="images">
                <h3>Queen</h3>
            </div>

            <div class="card">
                <img src="https://resizing.flixster.com/-XZAfHZM39UwaGJIFWKAE8fS0ak=/v3/t/assets/p10193521_p_v8_ap.jpg" alt="" class="images">
                <h3>lunchBox</h3>
            </div>

            <div class="card">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQPp7WmXEM1Rzk9rGhSu6Rs6QcLDmvph8eMJ0gHtLRgB5onm4TlwH9USO3G&s=10" alt="" class="images">
                <h3>Krishna Cottage</h3>
            </div>

            <div class="card">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSEMAGGS72H98pxUt9MIODtyYna5cmE079LrpaCU_p6MUiWdGn2D6ctQ-RP&s=10" alt="" class="images">
                <h3>Wednesday</h3>
            </div>

            <div class="card">
                <img src="https://m.media-amazon.com/images/I/810cJGXnk0L._AC_UF1000,1000_QL80_.jpg" alt="" class="images">
                <h3>Queen</h3>
            </div>

            <div class="card">
                <img src="https://resizing.flixster.com/-XZAfHZM39UwaGJIFWKAE8fS0ak=/v3/t/assets/p10193521_p_v8_ap.jpg" alt="" class="images">
                <h3>lunchBox</h3>
            </div>

         </div>

        <div class="bot">
            <img src="./image.png" alt="">
         </div>
    </main>
</body>
</html>
